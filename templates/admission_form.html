<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Admission | Ideal International School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .form-card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card">
                <div class="form-header">
                    <h2><i class="bi bi-pencil-square"></i> Online Admission Form</h2>
                    <p>Ideal International School, Tarwara, Bihar</p>
                </div>
                <div class="p-4">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for cat, msg in messages %}
                            <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
                        {% endfor %}
                    {% endwith %}
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3"><label>Full Name *</label><input type="text" name="full_name" class="form-control" required></div>
                            <div class="col-md-6 mb-3"><label>Father's Name</label><input type="text" name="father_name" class="form-control"></div>
                            <div class="col-md-6 mb-3"><label>Mother's Name</label><input type="text" name="mother_name" class="form-control"></div>
                            <div class="col-md-3 mb-3"><label>Date of Birth</label><input type="date" name="dob" class="form-control"></div>
                            <div class="col-md-3 mb-3"><label>Gender</label><select name="gender" class="form-select"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
                            <div class="col-md-6 mb-3"><label>Applying for Class *</label><select name="applying_class" class="form-select" required>
                                <option value="">Select Class</option>
                                <option>Class 1</option><option>Class 2</option><option>Class 3</option><option>Class 4</option><option>Class 5</option>
                                <option>Class 6</option><option>Class 7</option><option>Class 8</option><option>Class 9</option><option>Class 10</option>
                                <option>Class 11 Science</option><option>Class 11 Commerce</option><option>Class 11 Arts</option>
                                <option>Class 12 Science</option><option>Class 12 Commerce</option><option>Class 12 Arts</option>
                            </select></div>
                            <div class="col-md-6 mb-3"><label>Phone *</label><input type="tel" name="phone" class="form-control" required></div>
                            <div class="col-md-6 mb-3"><label>Email</label><input type="email" name="email" class="form-control"></div>
                            <div class="col-12 mb-3"><label>Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
                            <div class="col-12 mb-3"><label>Previous School (if any)</label><input type="text" name="previous_school" class="form-control"></div>
                        </div>
                        <button type="submit" class="btn btn-submit btn-primary w-100">Submit Application</button>
                    </form>
                    <div class="mt-3 text-center"><a href="{{ url_for('login') }}">← Back to Login</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
