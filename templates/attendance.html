{% extends "base.html" %}

{% block content %}
<h1 class="mt-4">Mark Attendance</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('faculty_dashboard') }}">Dashboard</a></li>
    <li class="breadcrumb-item active">Attendance</li>
</ol>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-check2-square"></i> Select Subject and Date</div>
    <div class="card-body">
        <form method="POST" id="attendanceForm">
            <div class="row">
                <div class="col-md-5">
                    <label>Subject</label>
                    <select class="form-select" name="subject_id" id="subjectSelect" required>
                        <option value="">-- Select Subject --</option>
                        {% for assignment in assignments %}
                        <option value="{{ assignment.subject.id }}">{{ assignment.subject.name }} ({{ assignment.subject.class_name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Date</label>
                    <input type="date" class="form-control" name="date" id="attendanceDate" value="{{ today }}">
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-info mt-4" onclick="loadStudents()">Load Students</button>
                </div>
            </div>
            
            <div id="studentList" style="display:none; margin-top:20px;">
                <h5>Student List</h5>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Roll No</th><th>Student Name</th><th>Status</th><th>WhatsApp</th></tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
                <button type="submit" class="btn btn-primary mt-2">Save Attendance</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadStudents() {
    const subjectId = document.getElementById('subjectSelect').value;
    if (!subjectId) {
        alert('Please select a subject');
        return;
    }
    
    const tbody = document.getElementById('studentTableBody');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Loading...<\/td><\/tr>';
    document.getElementById('studentList').style.display = 'block';
    
    fetch(`/api/get_students_by_subject/${subjectId}`)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-danger">API Error: ${data.error}<\/td><\/tr>`;
                return;
            }
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-warning">No students found for this subject/class.<\/td><\/tr>';
                return;
            }
            
            let html = '';
            data.forEach(student => {
                const phone = student.phone || '';
                const whatsappBtn = `<button class="btn btn-sm btn-success whatsapp-btn" 
                    data-phone="${phone}" 
                    data-name="${student.name.replace(/['"]/g, '\\"')}" 
                    data-roll="${student.roll_no}">
                    <i class="bi bi-whatsapp"><\/i> Alert
                <\/button>`;
                
                html += `<tr>
                    <td>${student.roll_no}<\/td>
                    <td>${student.name}<\/td>
                    <td>
                        <select name="status_${student.id}" class="form-select">
                            <option value="Present">✅ Present</option>
                            <option value="Absent">❌ Absent</option>
                        <\/select>
                    <\/td>
                    <td>${whatsappBtn}<\/td>
                <\/tr>`;
            });
            tbody.innerHTML = html;
            
            // Attach WhatsApp click handlers
            document.querySelectorAll('.whatsapp-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const phone = this.dataset.phone;
                    const name = this.dataset.name;
                    const roll = this.dataset.roll;
                    if (!phone) {
                        alert('No phone number for this student. Please update in Admin panel.');
                        return;
                    }
                    const subject = document.getElementById('subjectSelect').selectedOptions[0]?.text || 'subject';
                    const date = document.getElementById('attendanceDate').value;
                    const msg = `Dear Parent, your child ${name} (Roll: ${roll}) was marked absent on ${date} for ${subject}. - Children's Rise High School`;
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                });
            });
        })
        .catch(error => {
            console.error('Fetch error:', error);
            tbody.innerHTML = `<tr><td colspan="4" class="text-danger">Network error: ${error.message}<\/td><\/tr>`;
        });
}
</script>
{% endblock %}
