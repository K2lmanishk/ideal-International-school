{% extends "base.html" %}

{% block content %}
<h1 class="mt-4">Mark Attendance</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('faculty_dashboard') }}">Dashboard</a></li>
    <li class="breadcrumb-item active">Attendance</li>
</ol>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-check2-square"></i> Select Subject and Date</div>
    <div class="card-body">
        <form method="POST" id="attendanceForm">
            <div class="row">
                <div class="col-md-5">
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select class="form-select" name="subject_id" id="subjectSelect" required>
                            <option value="">-- Select Subject --</option>
                            {% for assignment in assignments %}
                            <option value="{{ assignment.subject.id }}">{{ assignment.subject.name }} ({{ assignment.subject.class_name }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date" class="form-control" name="date" id="attendanceDate" required value="{{ today }}">
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-info mt-4" onclick="loadStudents()">Load Students</button>
                </div>
            </div>
            
            <div id="studentList" style="display:none; margin-top:20px;">
                <h5>Student List</h5>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Roll No</th><th>Student Name</th><th>Status</th><th>WhatsApp Alert</th></tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
                <button type="submit" class="btn btn-primary">Save Attendance</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadStudents() {
    var subjectId = document.getElementById('subjectSelect').value;
    if (!subjectId) { alert('Select a subject first'); return; }
    
    var tbody = document.getElementById('studentTableBody');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Loading...</td></tr>';
    document.getElementById('studentList').style.display = 'block';
    
    fetch('/api/get_students_by_subject/' + subjectId)
        .then(res => res.json())
        .then(data => {
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4">No students found for this subject.</td></tr>';
                return;
            }
            
            var html = '';
            data.forEach(student => {
                // ALWAYS show the WhatsApp button, even if phone is empty
                var phone = student.phone || '';
                var whatsappBtn = `<button class="btn btn-sm btn-success whatsapp-btn" 
                    data-phone="${phone}" 
                    data-name="${student.name.replace(/['"]/g, '\\"')}" 
                    data-roll="${student.roll_no}">
                    <i class="bi bi-whatsapp"></i> Send Alert
                </button>`;
                
                html += `<tr>
                    <td>${student.roll_no}</td>
                    <td>${student.name}</td>
                    <td>
                        <select name="status_${student.id}" class="form-select">
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </td>
                    <td>${whatsappBtn}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
            
            // Attach click handlers to WhatsApp buttons
            document.querySelectorAll('.whatsapp-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const phone = this.dataset.phone;
                    const name = this.dataset.name;
                    const roll = this.dataset.roll;
                    if (!phone) {
                        alert('No phone number for this student. Please update in Admin panel.');
                        return;
                    }
                    const subject = document.getElementById('subjectSelect').selectedOptions[0]?.text || 'subject';
                    const date = document.getElementById('attendanceDate').value;
                    const msg = `Dear Parent, your child ${name} (Roll: ${roll}) was marked absent on ${date} for ${subject}. - Ideal School`;
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                });
            });
        })
        .catch(err => {
            console.error(err);
            tbody.innerHTML = '<tr><td colspan="4">Error loading students.</td></tr>';
        });
}
</script>
{% endblock %}
