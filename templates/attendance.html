{% extends "base.html" %}

{% block content %}
<h1 class="mt-4">Mark Attendance</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('faculty_dashboard') }}">Dashboard</a></li>
    <li class="breadcrumb-item active">Attendance</li>
</ol>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-check2-square"></i> Select Subject and Date</div>
    <div class="card-body">
        <form method="POST" id="attendanceForm">
            <div class="row">
                <div class="col-md-5">
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select class="form-select" name="subject_id" id="subjectSelect" required>
                            <option value="">-- Select Subject --</option>
                            {% for assignment in assignments %}
                            <option value="{{ assignment.subject.id }}">{{ assignment.subject.name }} ({{ assignment.subject.class_name }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" name="date" id="attendanceDate" required value="{{ today }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">&nbsp;</label>
                        <button type="button" class="btn btn-info d-block w-100" onclick="loadStudentsForSubject()">
                            <i class="bi bi-people-fill me-2"></i>Load Students
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="studentList" style="display: none;">
                <hr>
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
                    <h5>Student List</h5>
                    <div>
                        <button type="button" class="btn btn-success btn-sm" onclick="markAllPresent()">
                            <i class="bi bi-check-all"></i> Mark All Present
                        </button>
                        <button type="button" class="btn btn-warning btn-sm" onclick="markAllAbsent()">
                            <i class="bi bi-x-circle"></i> Mark All Absent
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Roll No</th><th>Student Name</th><th>Status</th><th>WhatsApp Alert</th></tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
                <button type="submit" class="btn btn-primary mt-3"><i class="bi bi-save me-2"></i>Save Attendance</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadStudentsForSubject() {
    var subjectId = document.getElementById('subjectSelect').value;
    if (!subjectId) { alert('Please select a subject'); return; }
    var tbody = document.getElementById('studentTableBody');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Loading...</td></tr>';
    document.getElementById('studentList').style.display = 'block';
    
    fetch('/api/get_students_by_subject/' + subjectId)
        .then(response => response.json())
        .then(data => {
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-warning">No students found for this subject/class.</td></tr>';
                return;
            }
            var html = '';
            data.forEach(student => {
                var phone = student.phone || '';
                // Always show button but will alert if no phone
                var whatsappBtn = `<button class="btn btn-sm btn-success send-whatsapp-btn" 
                    data-phone="${phone}" 
                    data-name="${student.name.replace(/['"]/g, '\\"')}" 
                    data-roll="${student.roll_no}">
                    <i class="bi bi-whatsapp"></i> Alert
                </button>`;
                html += `<tr>
                    <td>${student.roll_no}</td>
                    <td>${student.name}</td>
                    <td><select class="form-select" name="status_${student.id}">
                        <option value="Present">✅ Present</option>
                        <option value="Absent">❌ Absent</option>
                    </select></td>
                    <td>${whatsappBtn}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
            
            // Attach WhatsApp click handlers
            document.querySelectorAll('.send-whatsapp-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const phone = this.dataset.phone;
                    const name = this.dataset.name;
                    const roll = this.dataset.roll;
                    if (!phone || phone.trim() === '') {
                        alert('No phone number available for this student. Please update in Admin panel.');
                        return;
                    }
                    const subject = document.getElementById('subjectSelect').options[document.getElementById('subjectSelect').selectedIndex]?.text || 'Subject';
                    const date = document.getElementById('attendanceDate').value;
                    const message = `Dear Parent, your child ${name} (Roll No: ${roll}) was absent on ${date} for ${subject}. Please ensure regular attendance. - Ideal School`;
                    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
                    window.open(url, '_blank');
                });
            });
        })
        .catch(err => {
            console.error(err);
            tbody.innerHTML = '<tr><td colspan="4" class="text-danger">Error loading students.</td></tr>';
        });
}

function markAllPresent() {
    document.querySelectorAll('#studentTableBody select').forEach(s => s.value = 'Present');
}
function markAllAbsent() {
    document.querySelectorAll('#studentTableBody select').forEach(s => s.value = 'Absent');
}
</script>
{% endblock %}
