{% extends "base.html" %}

{% block content %}
<h1 class="mt-4">Enter Marks</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('faculty_dashboard') }}">Dashboard</a></li>
    <li class="breadcrumb-item active">Marks Entry</li>
</ol>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-pencil-square"></i> Select Subject and Exam</div>
    <div class="card-body">
        <form method="POST" id="marksForm">
            <div class="row">
                <div class="col-md-4">
                    <label>Subject</label>
                    <select class="form-select" name="subject_id" id="subjectSelect" required>
                        <option value="">-- Select Subject --</option>
                        {% for assignment in assignments %}
                        <option value="{{ assignment.subject.id }}">{{ assignment.subject.name }} ({{ assignment.subject.class_name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Exam Type</label>
                    <select class="form-select" name="exam_type" id="examType" required>
                        <option value="Unit Test 1">Unit Test 1</option>
                        <option value="Unit Test 2">Unit Test 2</option>
                        <option value="Half Yearly">Half Yearly</option>
                        <option value="Pre-Board">Pre-Board</option>
                        <option value="Final Exam">Final Exam</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Maximum Marks</label>
                    <input type="number" class="form-control" name="max_marks" id="maxMarks" placeholder="e.g., 100" required>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-info mt-4" onclick="loadStudents()">Load Students</button>
                </div>
            </div>
            
            <div id="studentMarksList" style="display:none; margin-top:20px;">
                <h5>Enter Marks</h5>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Roll No</th><th>Student Name</th><th>Marks (Out of <span id="maxMarksDisplay">0</span>)</th></tr>
                        </thead>
                        <tbody id="studentMarksTableBody"></tbody>
                    </table>
                </div>
                <button type="submit" class="btn btn-primary mt-2">Save Marks</button>
            </div>
        </form>
    </div>
</div>

<script>
function loadStudents() {
    const subjectId = document.getElementById('subjectSelect').value;
    const maxMarks = document.getElementById('maxMarks').value;
    
    if (!subjectId) { alert('Please select a subject'); return; }
    if (!maxMarks || maxMarks <= 0) { alert('Please enter maximum marks'); return; }
    
    document.getElementById('maxMarksDisplay').innerText = maxMarks;
    const tbody = document.getElementById('studentMarksTableBody');
    tbody.innerHTML = '<tr><td colspan="3" class="text-center">Loading...<\/td><\/tr>';
    document.getElementById('studentMarksList').style.display = 'block';
    
    fetch(`/api/get_students_by_subject/${subjectId}`)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-danger">API Error: ${data.error}<\/td><\/tr>`;
                return;
            }
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-warning">No students found for this subject/class.<\/td><\/tr>';
                return;
            }
            
            let html = '';
            data.forEach(student => {
                html += `<tr>
                    <td>${student.roll_no}<\/td>
                    <td>${student.name}<\/td>
                    <td>
                        <input type="number" class="form-control" name="marks_${student.id}" 
                               min="0" max="${maxMarks}" step="0.5" placeholder="Enter marks">
                    <\/td>
                <\/tr>`;
            });
            tbody.innerHTML = html;
        })
        .catch(error => {
            console.error('Fetch error:', error);
            tbody.innerHTML = `<tr><td colspan="3" class="text-danger">Network error: ${error.message}<\/td><\/tr>`;
        });
}
</script>
{% endblock %}
